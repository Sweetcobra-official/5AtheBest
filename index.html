<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Викторина 5А</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --item-h: 120px;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fad0c4, #a1c4fd);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .screen-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: visible;
        }

        .hidden-screen {
            opacity: 0;
            transform: scale(0.8) translateY(50px);
            pointer-events: none;
            visibility: hidden;
        }

        .cylinder-viewport {
            height: calc(var(--item-h) * 3);
            width: 100%;
            max-width: 600px;
            position: relative;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
        }

        .strip {
            position: absolute;
            width: 100%;
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .name-item {
            height: var(--item-h);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            font-weight: 900;
            color: #1e293b;
            text-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-quiz {
            background: white;
            border: 3px solid transparent;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }

        .btn-quiz:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.15);
        }

        .is-correct { background-color: #10b981 !important; color: white; }
        .is-wrong { background-color: #ef4444 !important; color: white; }

        #winner-flyer {
            position: fixed;
            z-index: 999;
            pointer-events: none;
            font-weight: 900;
            color: #2563eb;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
        }

        /* Отладочная панель и редактор */
        #debug-hotspot {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 60px;
            height: 60px;
            background: transparent;
            z-index: 10000;
            cursor: pointer;
        }
        #debug-panel {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px;
            border-radius: 20px;
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 10001;
            font-family: monospace;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #debug-panel button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        #debug-panel button:hover {
            background: #2563eb;
        }
        #debug-panel .close {
            background: #ef4444;
        }
        #debug-panel .close:hover {
            background: #dc2626;
        }
        /* Модальное окно редактора */
        #editor-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20000;
        }
        .editor-content {
            background: white;
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            border-radius: 40px;
            padding: 30px;
            overflow-y: auto;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-button {
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            background: #e2e8f0;
        }
        .tab-button.active {
            background: #3b82f6;
            color: white;
        }
        .question-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid #cbd5e1;
        }
        .question-item input, .question-item select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
        }
        .option-row {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .btn-small {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 5px 15px;
            cursor: pointer;
        }
        .btn-small.danger {
            background: #ef4444;
        }
        .btn-small.success {
            background: #10b981;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <!-- Отладочный хотспот и панель -->
    <div id="debug-hotspot" title="Отладка (5 кликов)"></div>
    <div id="debug-panel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold;">🔧 Отладка</span>
            <button class="close" style="padding: 5px 10px;" onclick="closeDebugPanel()">✕</button>
        </div>
        <button id="debug-next-general">⏩ Следующий общий</button>
        <button id="debug-next-personal">⏩ Следующий персональный</button>
        <button id="debug-reset">🔄 Сброс прогресса</button>
        <button id="debug-final">🏁 Перейти в финал</button>
        <button id="debug-edit-questions">✏️ Редактор вопросов</button>
        <div style="font-size: 12px; margin-top: 5px;" id="debug-state"></div>
    </div>

    <!-- Модальное окно редактора вопросов -->
    <div id="editor-modal">
        <div class="editor-content">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2 style="font-size: 2rem; font-weight: bold;">Редактор вопросов</h2>
                <button class="btn-small danger" onclick="closeEditor()">Закрыть</button>
            </div>
            <div class="tab-buttons">
                <div class="tab-button active" data-tab="general">Общие вопросы</div>
                <div class="tab-button" data-tab="personal">Персональные вопросы</div>
            </div>
            <div id="general-editor" style="display: block;">
                <!-- будет заполнено динамически -->
            </div>
            <div id="personal-editor" style="display: none;">
                <!-- будет заполнено динамически -->
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn-small success" onclick="saveQuestions()">Сохранить изменения</button>
                <button class="btn-small" onclick="resetToDefault()">Сброс к дефолтным</button>
            </div>
        </div>
    </div>

    <div id="screen-intro" class="screen-container">
        <h1 id="intro-text" class="text-8xl font-black text-white drop-shadow-2xl text-center px-4 transition-opacity duration-500"></h1>
    </div>

    <div id="screen-general" class="screen-container hidden-screen">
        <div class="bg-white/90 backdrop-blur-lg p-12 rounded-[3rem] shadow-2xl max-w-4xl w-full mx-6">
            <h2 id="gen-q" class="text-5xl font-bold text-gray-800 text-center mb-12"></h2>
            <div id="gen-opts" class="grid grid-cols-2 gap-6"></div>
        </div>
    </div>

    <div id="screen-personal" class="screen-container hidden-screen">
        <div id="cylinder-group" class="w-full flex flex-col items-center justify-center">
            <div class="cylinder-viewport">
                <div id="name-strip" class="strip"></div>
            </div>
        </div>

        <div id="pers-q-card" class="opacity-0 translate-y-20 transition-all duration-700 bg-white/90 backdrop-blur-lg p-10 rounded-[3rem] shadow-2xl max-w-4xl w-full mx-6 mt-12">
            <h2 id="pers-q" class="text-4xl font-bold text-gray-800 text-center mb-10"></h2>
            <div id="pers-opts" class="grid grid-cols-2 gap-6"></div>
        </div>
    </div>

    <div id="screen-final" class="screen-container hidden-screen">
        <h1 class="text-9xl font-black text-white drop-shadow-2xl text-center">ФИНАЛ!</h1>
        <p class="text-4xl text-white font-bold mt-4 text-center">Вы супер-команда 5А!</p>
    </div>

    <script>
        // ========== ИСХОДНЫЕ ДАННЫЕ (DEFAULT) ==========
        const DEFAULT_GENERAL = [
            { q: "В каком месяце весна начинает петь?", opts: ["Январь", "Март", "Сентябрь", "Ноябрь"], ok: 1 },
            { q: "Главный символ 8 Марта?", opts: ["Снеговик", "Тюльпаны", "Ёлка", "Арбуз"], ok: 1 },
            { q: "Самые красивые в 5А — это...", opts: ["Компьютеры", "Парты", "Все девочки!", "Учебники"], ok: 2 },
            { q: "Какой праздник отмечают 8 марта?", opts: ["День защитника", "Женский день", "Новый год", "День смеха"], ok: 1 },
            { q: "Что чаще всего дарят девочкам на 8 марта?", opts: ["Цветы", "Конструктор", "Мяч", "Рыбку"], ok: 0 },
            { q: "Сколько месяцев в году?", opts: ["10", "12", "14", "6"], ok: 1 },
            { q: "Какой день недели следует за пятницей?", opts: ["Суббота", "Воскресенье", "Четверг", "Понедельник"], ok: 0 }
        ];

        const DEFAULT_PERSONAL = [
            { q: "какой талант ты бы хотела развить?", opts: ["Петь как звезда", "Рисовать шедевры", "Побеждать в спорте", "Учить 10 языков"], turnChance: 1.0 },
            { q: "какое приключение ты выберешь?", opts: ["Полёт на Луну", "В джунгли", "В школу магии", "В будущее"], turnChance: 0.0 },
            { q: "твой идеальный выходной — это...", opts: ["Сон до обеда", "Вечеринка с друзьями", "Киномарафон", "Парк аттракционов"], turnChance: 0.6 },
            { q: "Кем ты хочешь стать, когда вырастешь?", opts: ["Врачом", "Учителем", "Художником", "Программистом"] },
            { q: "Твой любимый предмет в школе?", opts: ["Математика", "Физкультура", "Рисование", "Музыка"] },
            { q: "Что тебя вдохновляет?", opts: ["Природа", "Музыка", "Книги", "Друзья"] },
            { q: "Вскрывайся! Расскажи свой самый смешной случай из жизни.", reveal: true },
            { q: "Вскрывайся! Кто твой лучший друг и почему?", reveal: true },
            { q: "Вскрывайся! Чего ты боишься больше всего?", reveal: true },
            { q: "Вскрывайся! Какую суперсилу ты хотела бы иметь?", reveal: true },
            { q: "Вскрывайся! Что ты любишь есть на завтрак?", reveal: true },
            { q: "Вскрывайся! О чём ты мечтаешь?", reveal: true }
        ];

        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ВОПРОСОВ (ЗАГРУЖАЮТСЯ ИЗ LOCALSTORAGE) ==========
        let generalQuestions = [];
        let personalQuestions = [];

        // ========== НАСТРОЙКИ ==========
        const DEFAULT_TURN_CHANCE = 0.75;

        // ========== СОСТОЯНИЕ ВИКТОРИНЫ ==========
        let state = { 
            gen: 0,                      // индекс текущего общего вопроса
            pers: 0,                      // индекс текущего персонального вопроса
            names: []                     // будет инициализировано из girls
        };

        const girls = ["Шамсият", "Ульяна", "Вероника", "Ксюша", "Соня", "Вера", "Пелагея", "Злата", "Диана", "Аня", "Марго", "Арина", "Настя", "Люда"];

        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С LOCALSTORAGE ==========
        function loadQuestionsFromStorage() {
            const storedGeneral = localStorage.getItem('quiz_general');
            const storedPersonal = localStorage.getItem('quiz_personal');
            generalQuestions = storedGeneral ? JSON.parse(storedGeneral) : DEFAULT_GENERAL.map(q => ({ ...q }));
            personalQuestions = storedPersonal ? JSON.parse(storedPersonal) : DEFAULT_PERSONAL.map(q => ({ ...q }));
        }

        function saveQuestionsToStorage() {
            localStorage.setItem('quiz_general', JSON.stringify(generalQuestions));
            localStorage.setItem('quiz_personal', JSON.stringify(personalQuestions));
        }

        // Сброс к дефолтным
        function resetToDefault() {
            generalQuestions = DEFAULT_GENERAL.map(q => ({ ...q }));
            personalQuestions = DEFAULT_PERSONAL.map(q => ({ ...q }));
            saveQuestionsToStorage();
            renderEditor(); // обновить редактор
            // Если мы сейчас на каком-то экране, перерисовать его
            refreshCurrentScreen();
        }

        // Обновить текущий экран после изменений вопросов
        function refreshCurrentScreen() {
            const activeScreen = document.querySelector('.screen-container:not(.hidden-screen)');
            if (!activeScreen) return;
            const id = activeScreen.id;
            if (id === 'screen-general') {
                // Если индекс выходит за границы, сбросить на 0
                if (state.gen >= generalQuestions.length) state.gen = Math.max(0, generalQuestions.length - 1);
                renderGeneral();
            } else if (id === 'screen-personal') {
                if (state.pers >= personalQuestions.length) state.pers = Math.max(0, personalQuestions.length - 1);
                // Персональный экран требует особого сброса, но runPersonal сам всё перезапустит
                // Но лучше просто перезапустить runPersonal, если мы на этом экране
                runPersonal();
            }
        }

        // ========== ОСНОВНЫЕ ФУНКЦИИ ВИКТОРИНЫ ==========
        const wait = ms => new Promise(r => setTimeout(r, ms));

        async function showScreen(id) {
            document.querySelectorAll('.screen-container').forEach(s => s.classList.add('hidden-screen'));
            await wait(100);
            const target = document.getElementById(id);
            if (target) target.classList.remove('hidden-screen');
            updateDebugState();
        }

        async function startIntro() {
            const t = document.getElementById('intro-text');
            if (!t) return;
            
            t.innerText = "Привет!";
            t.style.opacity = 1;
            await wait(1500);
            t.style.opacity = 0;
            await wait(500);
            t.innerText = "Давай поиграем!";
            t.style.opacity = 1;
            await wait(1500);
            await showScreen('screen-general');
            renderGeneral();
        }

        function renderGeneral() {
            if (state.gen >= generalQuestions.length) {
                goTransition();
                return;
            }
            const q = generalQuestions[state.gen];
            const qEl = document.getElementById('gen-q');
            const optsContainer = document.getElementById('gen-opts');
            
            if (!qEl || !optsContainer) return;

            qEl.innerText = q.q;
            optsContainer.innerHTML = '';

            q.opts.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "btn-quiz p-8 rounded-3xl text-2xl font-black text-gray-700";
                b.innerText = opt;
                b.onclick = async () => {
                    const all = optsContainer.querySelectorAll('button');
                    all.forEach(btn => btn.disabled = true);
                    if (i === q.ok) b.classList.add('is-correct');
                    else { 
                        b.classList.add('is-wrong'); 
                        all[q.ok].classList.add('is-correct'); 
                    }
                    await wait(1500);
                    state.gen++;
                    renderGeneral();
                };
                optsContainer.appendChild(b);
            });
            updateDebugState();
        }

        async function goTransition() {
            await showScreen('screen-intro');
            const t = document.getElementById('intro-text');
            if (t) {
                t.style.opacity = 1;
                t.innerText = "Сделаем игру интересней...";
            }
            await wait(2500);
            await showScreen('screen-personal');
            runPersonal();
        }

        async function runPersonal() {
            if (state.pers >= personalQuestions.length || state.names.length === 0) {
                showScreen('screen-final');
                return;
            }

            document.getElementById('winner-flyer')?.remove();

            const strip = document.getElementById('name-strip');
            const qCard = document.getElementById('pers-q-card');
            const cylinderGroup = document.getElementById('cylinder-group');
            const qText = document.getElementById('pers-q');
            const optsContainer = document.getElementById('pers-opts');

            if (!strip || !qCard || !cylinderGroup || !qText || !optsContainer) return;

            qCard.classList.add('opacity-0', 'translate-y-20', 'hidden');
            cylinderGroup.classList.remove('hidden');
            cylinderGroup.style.display = 'flex';
            strip.style.transition = 'none';
            strip.style.transform = 'translateY(0px)';
            optsContainer.innerHTML = '';

            const remaining = state.names.length;
            const candidateIndex = Math.floor(Math.random() * remaining);
            const candidate = state.names[candidateIndex];
            const nextIndex = (candidateIndex + 1) % remaining;
            const nextCandidate = state.names[nextIndex];

            const q = personalQuestions[state.pers];
            const turnChance = q.turnChance !== undefined ? q.turnChance : DEFAULT_TURN_CHANCE;
            const doTurn = Math.random() < turnChance;

            const finalWinner = doTurn ? nextCandidate : candidate;
            state.names = state.names.filter(name => name !== finalWinner);

            const totalItems = 42;
            const targetPos = 20;
            const items = [];

            for (let i = 0; i < totalItems; i++) {
                items.push(girls[Math.floor(Math.random() * girls.length)]);
            }
            items[targetPos] = candidate;
            if (targetPos + 1 < totalItems) {
                items[targetPos + 1] = nextCandidate;
            }

            strip.innerHTML = '';
            items.forEach(name => {
                const d = document.createElement('div');
                d.className = "name-item";
                d.innerText = name;
                strip.appendChild(d);
            });

            await wait(100);

            const itemH = 120;
            const viewportH = itemH * 3;
            const baseOffset = -(targetPos * itemH) + (viewportH / 2 - itemH / 2);

            strip.style.transition = 'transform 6s cubic-bezier(0.1, 0.4, 0.1, 1)';
            strip.style.transform = `translateY(${baseOffset}px)`;

            await wait(6200);

            if (doTurn) {
                const turnOffset = baseOffset - itemH;
                strip.style.transition = 'transform 0.8s cubic-bezier(0.2, 0.9, 0.3, 1)';
                strip.style.transform = `translateY(${turnOffset}px)`;
                await wait(1000);
            }

            let finalPos = targetPos + (doTurn ? 1 : 0);
            if (finalPos >= items.length) finalPos = items.length - 1;
            const winnerDiv = strip.children[finalPos];
            const actualWinner = winnerDiv.innerText;

            if (actualWinner !== finalWinner && state.names.includes(actualWinner)) {
                state.names = state.names.filter(name => name !== actualWinner);
                console.warn("Корректировка победителя: был", finalWinner, "стал", actualWinner);
            }

            const rect = winnerDiv.getBoundingClientRect();
            const flyer = document.createElement('div');
            flyer.id = "winner-flyer";
            flyer.innerText = actualWinner + "!";
            flyer.style.fontSize = "4.5rem";
            flyer.style.left = rect.left + "px";
            flyer.style.top = rect.top + "px";
            flyer.style.width = rect.width + "px";
            document.body.appendChild(flyer);

            cylinderGroup.classList.add('hidden');
            cylinderGroup.style.display = 'none';
            
            await wait(50);
            flyer.style.top = "5vh";
            flyer.style.fontSize = "3.5rem";

            qText.innerText = `${actualWinner}, ${q.q}`;

            if (q.reveal) {
                const btn = document.createElement('button');
                btn.className = "btn-quiz p-8 rounded-3xl text-3xl font-black text-gray-700 bg-white col-span-2";
                btn.innerText = "Рассказала ✨";
                btn.onclick = async () => {
                    btn.classList.add('is-correct');
                    await wait(1000);
                    flyer.remove();
                    state.pers++;
                    runPersonal();
                };
                optsContainer.appendChild(btn);
            } else {
                q.opts.forEach(o => {
                    const b = document.createElement('button');
                    b.className = "btn-quiz p-6 rounded-3xl text-2xl font-black text-gray-700 bg-white";
                    b.innerText = o;
                    b.onclick = async () => {
                        b.classList.add('is-correct');
                        await wait(1500);
                        flyer.remove();
                        state.pers++;
                        runPersonal();
                    };
                    optsContainer.appendChild(b);
                });
            }

            qCard.classList.remove('hidden');
            await wait(100);
            qCard.classList.remove('opacity-0', 'translate-y-20');
            updateDebugState();
        }

        // ========== ОТЛАДОЧНАЯ ПАНЕЛЬ ==========
        let debugClickCount = 0;
        let debugTimer;

        document.getElementById('debug-hotspot').addEventListener('click', () => {
            debugClickCount++;
            if (debugClickCount >= 5) {
                document.getElementById('debug-panel').style.display = 'flex';
                debugClickCount = 0;
                if (debugTimer) clearTimeout(debugTimer);
            } else {
                if (debugTimer) clearTimeout(debugTimer);
                debugTimer = setTimeout(() => { debugClickCount = 0; }, 3000);
            }
        });

        window.closeDebugPanel = function() {
            document.getElementById('debug-panel').style.display = 'none';
        };

        function updateDebugState() {
            const el = document.getElementById('debug-state');
            if (el) {
                el.innerText = `gen: ${state.gen}/${generalQuestions.length} | pers: ${state.pers}/${personalQuestions.length} | осталось: ${state.names.length}`;
            }
        }

        // Кнопки отладки
        document.getElementById('debug-next-general').addEventListener('click', async () => {
            closeDebugPanel();
            if (state.gen < generalQuestions.length) {
                state.gen++;
                if (document.getElementById('screen-general').classList.contains('hidden-screen') === false) {
                    renderGeneral();
                } else {
                    await showScreen('screen-general');
                    renderGeneral();
                }
            }
        });

        document.getElementById('debug-next-personal').addEventListener('click', async () => {
            closeDebugPanel();
            if (state.pers < personalQuestions.length) {
                state.pers++;
                if (document.getElementById('screen-personal').classList.contains('hidden-screen') === false) {
                    runPersonal();
                } else {
                    await showScreen('screen-personal');
                    runPersonal();
                }
            }
        });

        document.getElementById('debug-reset').addEventListener('click', () => {
            closeDebugPanel();
            state = { gen: 0, pers: 0, names: [...girls] };
            showScreen('screen-intro').then(() => {
                startIntro();
            });
        });

        document.getElementById('debug-final').addEventListener('click', () => {
            closeDebugPanel();
            showScreen('screen-final');
        });

        // ========== РЕДАКТОР ВОПРОСОВ ==========
        document.getElementById('debug-edit-questions').addEventListener('click', () => {
            closeDebugPanel();
            renderEditor();
            document.getElementById('editor-modal').style.display = 'flex';
        });

        window.closeEditor = function() {
            document.getElementById('editor-modal').style.display = 'none';
        };

        // Рендер редактора
        function renderEditor() {
            renderGeneralEditor();
            renderPersonalEditor();
            // Переключение вкладок
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const tab = btn.dataset.tab;
                    document.getElementById('general-editor').style.display = tab === 'general' ? 'block' : 'none';
                    document.getElementById('personal-editor').style.display = tab === 'personal' ? 'block' : 'none';
                });
            });
        }

        function renderGeneralEditor() {
            const container = document.getElementById('general-editor');
            container.innerHTML = '';
            generalQuestions.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = 'question-item';
                div.innerHTML = `
                    <div style="font-weight: bold;">Вопрос ${index+1}</div>
                    <input type="text" placeholder="Текст вопроса" value="${q.q.replace(/"/g, '&quot;')}" data-index="${index}" data-field="q">
                    <div class="flex-row">
                        ${[0,1,2,3].map(i => `
                            <div style="flex:1">
                                <input type="text" placeholder="Вариант ${i+1}" value="${(q.opts[i] || '').replace(/"/g, '&quot;')}" data-index="${index}" data-opt="${i}">
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex-row">
                        <span>Правильный ответ (индекс 0-3):</span>
                        <input type="number" min="0" max="3" value="${q.ok}" data-index="${index}" data-field="ok" style="width:60px;">
                        <button class="btn-small danger" onclick="deleteGeneralQuestion(${index})">Удалить</button>
                    </div>
                `;
                container.appendChild(div);
            });
            // Кнопка добавления
            const addBtn = document.createElement('button');
            addBtn.className = 'btn-small success';
            addBtn.innerText = '+ Добавить общий вопрос';
            addBtn.onclick = () => {
                generalQuestions.push({ q: "Новый вопрос", opts: ["", "", "", ""], ok: 0 });
                renderGeneralEditor();
            };
            container.appendChild(addBtn);
        }

        function renderPersonalEditor() {
            const container = document.getElementById('personal-editor');
            container.innerHTML = '';
            personalQuestions.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = 'question-item';
                const revealChecked = q.reveal ? 'checked' : '';
                const turnChance = q.turnChance !== undefined ? q.turnChance : DEFAULT_TURN_CHANCE;
                div.innerHTML = `
                    <div style="font-weight: bold;">Вопрос ${index+1}</div>
                    <input type="text" placeholder="Текст вопроса" value="${q.q.replace(/"/g, '&quot;')}" data-index="${index}" data-field="q">
                    <div class="flex-row">
                        <label><input type="checkbox" ${revealChecked} data-index="${index}" data-field="reveal"> Вскрывайся (без вариантов)</label>
                    </div>
                    <div id="personal-opts-${index}" style="${q.reveal ? 'display:none;' : ''}">
                        <div class="flex-row">
                            ${[0,1,2,3].map(i => `
                                <div style="flex:1">
                                    <input type="text" placeholder="Вариант ${i+1}" value="${(q.opts?.[i] || '').replace(/"/g, '&quot;')}" data-index="${index}" data-opt="${i}">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="flex-row">
                        <span>Вероятность доворота (0-1):</span>
                        <input type="number" step="0.01" min="0" max="1" value="${turnChance}" data-index="${index}" data-field="turnChance" style="width:80px;">
                        <button class="btn-small danger" onclick="deletePersonalQuestion(${index})">Удалить</button>
                    </div>
                `;
                container.appendChild(div);

                // Обработчик чекбокса reveal
                const checkbox = div.querySelector(`input[type="checkbox"][data-index="${index}"]`);
                checkbox.addEventListener('change', (e) => {
                    const optsDiv = document.getElementById(`personal-opts-${index}`);
                    optsDiv.style.display = e.target.checked ? 'none' : 'flex';
                });
            });
            const addBtn = document.createElement('button');
            addBtn.className = 'btn-small success';
            addBtn.innerText = '+ Добавить персональный вопрос';
            addBtn.onclick = () => {
                personalQuestions.push({ q: "Новый вопрос", opts: ["", "", "", ""], turnChance: DEFAULT_TURN_CHANCE });
                renderPersonalEditor();
            };
            container.appendChild(addBtn);
        }

        // Функции удаления
        window.deleteGeneralQuestion = (index) => {
            generalQuestions.splice(index, 1);
            renderGeneralEditor();
        };
        window.deletePersonalQuestion = (index) => {
            personalQuestions.splice(index, 1);
            renderPersonalEditor();
        };

        // Сохранение изменений из редактора
        window.saveQuestions = function() {
            // Сбор данных из полей общего редактора
            document.querySelectorAll('#general-editor .question-item').forEach((item, idx) => {
                if (idx >= generalQuestions.length) return;
                const qInput = item.querySelector('input[data-field="q"]');
                if (qInput) generalQuestions[idx].q = qInput.value;
                const okInput = item.querySelector('input[data-field="ok"]');
                if (okInput) generalQuestions[idx].ok = parseInt(okInput.value) || 0;
                [0,1,2,3].forEach(i => {
                    const optInput = item.querySelector(`input[data-opt="${i}"]`);
                    if (optInput) {
                        if (!generalQuestions[idx].opts) generalQuestions[idx].opts = [];
                        generalQuestions[idx].opts[i] = optInput.value;
                    }
                });
            });

            // Сбор данных из персонального редактора
            document.querySelectorAll('#personal-editor .question-item').forEach((item, idx) => {
                if (idx >= personalQuestions.length) return;
                const qInput = item.querySelector('input[data-field="q"]');
                if (qInput) personalQuestions[idx].q = qInput.value;
                const revealCheck = item.querySelector('input[data-field="reveal"]');
                const reveal = revealCheck ? revealCheck.checked : false;
                personalQuestions[idx].reveal = reveal;
                const turnChanceInput = item.querySelector('input[data-field="turnChance"]');
                if (turnChanceInput) {
                    const val = parseFloat(turnChanceInput.value);
                    personalQuestions[idx].turnChance = isNaN(val) ? DEFAULT_TURN_CHANCE : Math.min(1, Math.max(0, val));
                }
                if (!reveal) {
                    // собираем opts
                    if (!personalQuestions[idx].opts) personalQuestions[idx].opts = [];
                    [0,1,2,3].forEach(i => {
                        const optInput = item.querySelector(`input[data-opt="${i}"]`);
                        if (optInput) {
                            personalQuestions[idx].opts[i] = optInput.value;
                        }
                    });
                } else {
                    // убираем opts
                    delete personalQuestions[idx].opts;
                }
            });

            saveQuestionsToStorage();
            // Обновить текущий экран
            refreshCurrentScreen();
            // Закрыть редактор
            closeEditor();
        };

        // Инициализация
        loadQuestionsFromStorage();
        state.names = [...girls];

        window.onload = startIntro;
    </script>
</body>
</html>
